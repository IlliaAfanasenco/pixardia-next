services:
  postgres:
    image: postgres:16
    container_name: pixardia-db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pixardia
    volumes:
      - pixardia_postgres_data:/var/lib/postgresql/data

volumes:
  pixardia_postgres_data: